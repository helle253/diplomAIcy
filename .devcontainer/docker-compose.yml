version: '3.8'

services:
  diplomAIcy:
    image: mcr.microsoft.com/devcontainers/typescript-node:1-24
    command: sleep infinity
    environment:
      - CLAUDE_CONFIG_DIR=/home/node/.claude
    volumes:
      - ../..:/workspaces:cached
      - claude-config:/home/node/.claude

volumes:
  claude-config:
