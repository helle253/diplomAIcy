name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - run: corepack enable

      - run: yarn install --immutable

      - run: yarn build

      - run: yarn test

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - run: corepack enable

      - run: yarn install --immutable

      - run: yarn build

      - run: npx playwright install --with-deps chromium

      - run: yarn test:e2e

      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: |
            test-results/
          retention-days: 30
